name: Atualização Automática de Cursos

on:
  schedule:
    # Executa todos os dias às 10:00 UTC (07:00 BRT)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Permite execução manual

permissions:
  contents: write  # Necessário para commits automáticos

jobs:
  update-courses:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run course collector
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/coletor.py
      
      - name: Validate JSON database
        run: |
          python scripts/validator.py
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/data/cursos.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/cursos.json
          git commit -m "🤖 Atualização automática de cursos - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
      
      - name: No changes detected
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo "Nenhuma mudança detectada no banco de dados de cursos."
